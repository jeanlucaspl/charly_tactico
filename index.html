<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"/>
  <title>Charly Táctico — Generador de Prácticas</title>

  <script>
    window.MathJax = {
      tex: { inlineMath:[['$','$'],['\\(','\\)']], displayMath:[['$$','$$']] },
      options: { skipHtmlTags:['script','noscript','style','textarea','pre'] },
      startup: { typeset:false },
      svg: { fontCache: 'global' } // Optimiza la carga de las ecuaciones vectoriales
    };
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.0/es5/tex-mml-svg.js" async></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <script>
    const script = document.createElement('script');
    script.src = 'questions.js?v=' + new Date().getTime();
    document.head.appendChild(script);
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;700&display=swap');

    /* ════════════════════════════════════════════
       DISEÑO DE LA PANTALLA PRINCIPAL
    ════════════════════════════════════════════ */
    :root { --navy:#0a1628; --gold:#c9a84c; --gold2:#e8c97a; --cream:#f5f0e8; --silver:#8a9ab5; --white:#fff; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    
    body { background:var(--navy); color:var(--cream); font-family:'Crimson Pro',Georgia,serif; min-height:100vh; }
    
    .bg-effects { position:fixed; inset:0; z-index:0; pointer-events:none; background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(201,168,76,.12) 0%,transparent 70%), radial-gradient(ellipse 50% 40% at 90% 100%,rgba(155,35,53,.08) 0%,transparent 60%); }
    .screen-wrap { position:relative; z-index:1; display:flex; flex-direction:column; min-height:100vh; }
    header { text-align:center; padding:2.5rem 1.5rem 2rem; border-bottom:1px solid rgba(201,168,76,.3); background:linear-gradient(180deg,rgba(0,0,0,.4) 0%,transparent 100%); }
    .badge { display:inline-block; border:1px solid var(--gold); color:var(--gold); font-family:'JetBrains Mono',monospace; font-size:.68rem; letter-spacing:.18em; padding:.22rem .9rem; text-transform:uppercase; margin-bottom:1rem; }
    .site-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(2.8rem,8vw,6rem); line-height:.92; color:var(--white); }
    .site-title span { color:var(--gold); display:block; }
    .site-subtitle { margin-top:.7rem; font-size:.95rem; color:var(--silver); letter-spacing:.07em; }

    main { flex:1; max-width:860px; margin:2.5rem auto; padding:0 1rem; width:100%; }
    .panel { background:rgba(15,32,64,.85); border:1px solid rgba(201,168,76,.2); border-radius:4px; padding:2rem; }
    .panel-title { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:.1em; color:var(--gold); margin-bottom:1.5rem; }

    .nivel-group { display:grid; grid-template-columns:repeat(4,1fr); gap:.7rem; }
    .nivel-btn input { display:none; }
    .nivel-btn label { display:block; text-align:center; padding:.9rem .3rem; border:1.5px solid rgba(201,168,76,.25); border-radius:3px; cursor:pointer; background:rgba(0,0,0,.2); }
    .nivel-icon { font-size:1.5rem; display:block; margin-bottom:.25rem; }
    .nivel-name { font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:.12em; display:block; color:var(--cream); }
    .nivel-btn input:checked+label { border-color:var(--gold); background:rgba(201,168,76,.12); box-shadow:0 0 18px rgba(201,168,76,.2); }

    .btn-generar { width:100%; padding:1rem; background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 50%,var(--gold) 100%); color:var(--navy); border:none; border-radius:3px; font-family:'Bebas Neue',sans-serif; font-size:1.35rem; cursor:pointer; margin-top:2rem; }
    .spinner { display:none; text-align:center; padding:1.2rem; color:var(--gold); font-family:'Bebas Neue',sans-serif; letter-spacing:.15em; }
    .spinner.active { display:block; }

    /* ════════════════════════════════════════════
       SISTEMA DE VISTA PREVIA (ZOOM NATIVO)
    ════════════════════════════════════════════ */
    body.preview-active { background: #525659; overflow: auto; }
    body.preview-active .bg-effects, body.preview-active .screen-wrap { display: none; }
    
    #preview-overlay { display: none; padding: 20px 0; }
    body.preview-active #preview-overlay { display: block; }

    .preview-actions { display:flex; gap:1rem; margin-bottom:2rem; justify-content:center; flex-wrap:wrap; position: sticky; top: 0; z-index: 100; padding: 15px; background: rgba(82, 86, 89, 0.95); backdrop-filter: blur(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.3);}
    .btn-back, .btn-download { padding:.8rem 1.5rem; border-radius:4px; font-family:'Bebas Neue',sans-serif; font-size:1.1rem; cursor:pointer; letter-spacing: 1px; transition: 0.2s;}
    .btn-back { background: #fff; color: var(--navy); border: 2px solid var(--navy); }
    .btn-download { background: var(--gold); color: var(--navy); border: none; font-weight: bold;}
    .btn-download.loading { opacity: 0.6; pointer-events: none; }

    #pdf-wrapper { width: 210mm; margin: 0 auto; background: transparent; }

    /* ════════════════════════════════════════════
       LAS HOJAS A4 Y ALINEACIÓN DE TEXTO
    ════════════════════════════════════════════ */
    .a4-page {
      width: 210mm; height: 297mm; background: #fff; color: #000;
      font-family: 'Crimson Pro', Georgia, serif; 
      margin: 0 auto 20px auto; 
      padding: 15mm; 
      box-shadow: 0 8px 30px rgba(0,0,0,.4); 
      box-sizing: border-box;
      display: flex; flex-direction: column; position: relative; 
      overflow: hidden; 
      page-break-after: always;
    }

    .exam-header { text-align:center; border-bottom:2.5px solid #0a1628; padding-bottom:5px; margin-bottom:8px; }
    .exam-header-small { text-align:right; font-size:8pt; border-bottom:1px solid #ccc; padding-bottom:3px; margin-bottom:10px; color:#555;}
    .exam-institution { font-size:7pt; letter-spacing:.2em; text-transform:uppercase; color:#333; font-family:'JetBrains Mono',monospace; }
    .exam-title { font-family:'Bebas Neue',sans-serif; font-size:20pt; letter-spacing:.08em; color:#0a1628; line-height:1; margin:2px 0; }
    
    .alumno-fields { margin: 12px 0 20px; font-size: 8pt; width: 100%;}
    .field-label { font-size: 7pt; text-transform: uppercase; letter-spacing: .1em; color: #444; margin-bottom: 2px; }
    .field-line { border-bottom: 1px solid #777; min-height: 18px; width: 100%;}

    .page-content { flex-grow: 1; column-count: 2; column-gap: 8mm; column-fill: auto; width: 100%; height: 100%; overflow: hidden; }

    .seccion-header {
      column-span: all; -webkit-column-span: all; background: #0a1628; color: #fff;
      font-family: 'Bebas Neue', sans-serif; font-size: 10pt; letter-spacing: .12em;
      padding: 5px 10px; margin: 5px 0 12px 0; display: flex; justify-content: space-between; align-items: center; break-after: avoid; 
    }
    .seccion-pts { font-family:'JetBrains Mono',monospace;font-size:7.5pt;opacity:.85; }

    /* Ajustamos el line-height a 1.5 para dar espacio vertical a las raíces o fracciones */
    .q-item, .sol-item { break-inside: avoid; page-break-inside: avoid; margin-bottom: 14px; line-height: 1.5; }
    .q-subtema { font-size:6.5pt; color:#333; font-family:'JetBrains Mono',monospace; text-transform:uppercase; font-weight:bold; margin-bottom:2px; line-height: 1; }
    .q-num { font-weight:700; color:#0a1628; font-size:9.5pt; }
    .q-enunciado { margin-bottom:4px; font-size:9.5pt; color:#000; line-height: 1.5;}
    .q-alts { list-style:none; display:grid; grid-template-columns:1fr 1fr; gap:2px 6px; }
    .q-alts li { font-size:8.5pt; color:#000; line-height: 1.5;}
    
    .sol-rta { display:inline-block; background:#0a1628; color:#fff; font-family:'JetBrains Mono',monospace; font-size:7.5pt; padding:1px 5px; border-radius:2px; margin:0 4px 2px 0; vertical-align:middle; }
    .sol-text { font-size:9pt; color:#111; margin-top:2px; line-height: 1.4; }

    /* CORRECCIÓN EXACTA DE ALINEACIÓN PARA MATHJAX SVG: 
       Fuerza a la imagen vectorial a alinearse con la base del texto */
    mjx-container[jax="SVG"] {
      display: inline-block;
      vertical-align: middle; 
      margin: 0 1px;
    }

    #render-buffer { width: 86mm; position: absolute; left: -9999px; top: -9999px; visibility: hidden; }

  </style>
</head>
<body>

<div class="bg-effects"></div>

<div class="screen-wrap">
  <header>
    <div class="badge">Academia PNP · Sistema de Evaluación13</div>
    <h1 class="site-title">Charly<span>Táctico</span></h1>
    <p class="site-subtitle">Generador de Prácticas Semanales — Suboficiales &amp; Oficiales</p>
  </header>

  <main>
    <div class="panel">
      <div class="panel-title">⚙ Generar Práctica</div>
      <div class="nivel-group">
        <div class="nivel-btn"><input type="radio" name="nivel" id="n-princ" value="principiante"><label for="n-princ"><span class="nivel-icon">🔵</span><span class="nivel-name">Principiante</span></label></div>
        <div class="nivel-btn"><input type="radio" name="nivel" id="n-facil" value="facil"><label for="n-facil"><span class="nivel-icon">🟢</span><span class="nivel-name">Fácil</span></label></div>
        <div class="nivel-btn"><input type="radio" name="nivel" id="n-medio" value="medio" checked><label for="n-medio"><span class="nivel-icon">🟡</span><span class="nivel-name">Medio</span></label></div>
        <div class="nivel-btn"><input type="radio" name="nivel" id="n-dificil" value="dificil"><label for="n-dificil"><span class="nivel-icon">🔴</span><span class="nivel-name">Difícil</span></label></div>
      </div>
      <button class="btn-generar" onclick="iniciarGeneracion()">▶ GENERAR Y PREVISUALIZAR</button>
      <div class="spinner" id="spinner">Renderizando Matemáticas y Paginando...</div>
    </div>
  </main>
</div>

<div id="render-buffer"></div>

<div id="preview-overlay">
  <div class="preview-container">
    <div class="preview-actions">
      <button class="btn-back" onclick="cerrarPreview()">← VOLVER AL MENÚ</button>
      <button class="btn-download" id="btnDescargar" onclick="descargarComoPDF()">⬇ DESCARGAR PDF</button>
    </div>
    
    <div id="pdf-wrapper">
      <div id="paginas-examen"></div>
      <div id="paginas-soluciones"></div>
    </div>
  </div>
</div>

<script>
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function extraerPreguntas(db, subtemasConfig, nivel, totalRequerido) {
  let seleccionadas = [];
  let poolSobrantes = [];
  
  subtemasConfig.forEach(sub => {
    if(db[sub.key]) {
      let disponibles = shuffle(db[sub.key].filter(q => q.nivel === nivel));
      let cuota = Math.ceil(totalRequerido / subtemasConfig.length);
      seleccionadas.push(...disponibles.splice(0, cuota));
      poolSobrantes.push(...disponibles);
    }
  });

  if (seleccionadas.length > totalRequerido) {
    seleccionadas = shuffle(seleccionadas).slice(0, totalRequerido);
  } else if (seleccionadas.length < totalRequerido) {
    poolSobrantes = shuffle(poolSobrantes);
    let faltan = totalRequerido - seleccionadas.length;
    seleccionadas.push(...poolSobrantes.slice(0, faltan));
  }
  return shuffle(seleccionadas);
}

function crearBloquePregunta(q, num) {
  let div = document.createElement('div');
  div.className = 'q-item';
  div.innerHTML = `<div class="q-subtema">${q.subtema}</div><div class="q-enunciado"><span class="q-num">${num}.</span> ${q.enunciado}</div><ul class="q-alts">${q.alternativas.map(a=>`<li>${a}</li>`).join('')}</ul>`;
  return div;
}

function crearBloqueSolucion(q, num) {
  let div = document.createElement('div');
  div.className = 'sol-item';
  div.innerHTML = `<div style="display:flex; align-items:flex-start;"><span class="sol-num" style="margin-right:4px;">${num}.</span><span class="sol-rta">${q.respuesta}</span><span style="font-size:7.5pt; color:#222; font-weight:bold;">${q.subtema}</span></div><div class="sol-text">${q.solucion || ''}</div>`;
  return div;
}

function crearEncabezadoSeccion(titulo, cantidad) {
  let div = document.createElement('div');
  div.className = 'seccion-header';
  div.innerHTML = `<span>${titulo}</span> ${cantidad ? `<span class="seccion-pts">${cantidad} preguntas</span>` : ''}`;
  return div;
}

function crearHojaA4(pageNum, isSol, nivelStr) {
  const page = document.createElement('div');
  page.className = 'a4-page';
  
  const header = document.createElement('div');
  if (pageNum === 1) {
    header.className = 'exam-header';
    header.innerHTML = `
      <div class="exam-institution">Academia Charly Táctico ${isSol ? '— USO EXCLUSIVO DEL EVALUADOR' : ''}</div>
      <div class="exam-title">${isSol ? 'Hoja de Soluciones' : 'Examen General de Práctica'}</div>
      <div style="font-size:8pt; margin: 4px 0 10px 0;">Nivel de Exigencia: <b>${nivelStr.toUpperCase()}</b></div>
      ${!isSol ? `<div class="alumno-fields"><div class="field-label">Apellidos y Nombres:</div><div class="field-line"></div></div>` : ''}
    `;
  } else {
    header.className = 'exam-header-small';
    header.innerHTML = `Academia Charly Táctico — ${isSol ? 'Soluciones' : 'Práctica'} — Pág. ${pageNum}`;
  }
  
  page.appendChild(header);
  
  const content = document.createElement('div');
  content.className = 'page-content';
  page.appendChild(content);
  
  return { page, content };
}

async function iniciarGeneracion() {
  if (typeof QUESTIONS_DB === 'undefined') {
    alert("Cargando la base de datos desde GitHub. Por favor, espera 2 segundos e intenta de nuevo."); 
    return;
  }

  const nivel = document.querySelector('input[name="nivel"]:checked')?.value || 'medio';
  document.getElementById('spinner').classList.add('active');

  setTimeout(async () => {
    try {
      const buffer = document.getElementById('render-buffer');
      buffer.innerHTML = ''; 

      let itemsExamen = [];
      let itemsSolucion = [];
      const esP = (nivel === 'principiante');

      if (esP) {
        let pPrinc = extraerPreguntas(QUESTIONS_DB, CONFIG.principiante.subtemas, 'principiante', 30);
        itemsExamen.push(crearEncabezadoSeccion('Matemática — Nivel Principiante', pPrinc.length));
        itemsSolucion.push(crearEncabezadoSeccion('Soluciones — Nivel Principiante', null));
        pPrinc.forEach((q, i) => { itemsExamen.push(crearBloquePregunta(q, i+1)); itemsSolucion.push(crearBloqueSolucion(q, i+1)); });
      } else {
        let pRM = extraerPreguntas(QUESTIONS_DB, CONFIG.razonamientoMatematico.subtemas, nivel, 15);
        let pMat = extraerPreguntas(QUESTIONS_DB, CONFIG.matematicas.subtemas, nivel, 15);

        itemsExamen.push(crearEncabezadoSeccion('SECCIÓN I — Razonamiento Matemático', pRM.length));
        itemsSolucion.push(crearEncabezadoSeccion('SECCIÓN I — Soluciones', null));
        pRM.forEach((q, i) => { itemsExamen.push(crearBloquePregunta(q, i+1)); itemsSolucion.push(crearBloqueSolucion(q, i+1)); });

        itemsExamen.push(crearEncabezadoSeccion('SECCIÓN II — Matemáticas', pMat.length));
        itemsSolucion.push(crearEncabezadoSeccion('SECCIÓN II — Soluciones', null));
        pMat.forEach((q, i) => { itemsExamen.push(crearBloquePregunta(q, pRM.length+i+1)); itemsSolucion.push(crearBloqueSolucion(q, pRM.length+i+1)); });
      }

      itemsExamen.forEach(el => buffer.appendChild(el));
      itemsSolucion.forEach(el => buffer.appendChild(el));

      // Orden para que el motor vectorial dibuje las ecuaciones
      if (window.MathJax && window.MathJax.typesetPromise) {
        await MathJax.typesetPromise([buffer]);
      }

      document.body.classList.add('preview-active');
      
      function paginarElementos(arrayDOM, contenedorDestinoID, isSol) {
        const destino = document.getElementById(contenedorDestinoID);
        destino.innerHTML = '';
        
        let pageNum = 1;
        let actual = crearHojaA4(pageNum, isSol, nivel);
        destino.appendChild(actual.page);

        for (let i = 0; i < arrayDOM.length; i++) {
          let item = arrayDOM[i];
          actual.content.appendChild(item);
          
          if (Math.ceil(actual.content.scrollWidth) > Math.ceil(actual.content.clientWidth) + 5) {
            actual.content.removeChild(item); 
            pageNum++;
            actual = crearHojaA4(pageNum, isSol, nivel);
            destino.appendChild(actual.page);
            actual.content.appendChild(item);
          }
        }
      }

      paginarElementos(itemsExamen, 'paginas-examen', false);
      paginarElementos(itemsSolucion, 'paginas-soluciones', true);

      buffer.innerHTML = '';
      document.getElementById('spinner').classList.remove('active');

    } catch(err) {
      alert("Error: " + err.message);
      document.getElementById('spinner').classList.remove('active');
    }
  }, 300);
}

function cerrarPreview() {
  document.body.classList.remove('preview-active');
}

function descargarComoPDF() {
  const btn = document.getElementById('btnDescargar');
  btn.textContent = '⏳ PROCESANDO PDF...';
  btn.classList.add('loading');

  const paginas = document.querySelectorAll('.a4-page');
  paginas.forEach(p => {
    p.style.margin = '0';
    p.style.boxShadow = 'none';
  });

  const elemento = document.getElementById('pdf-wrapper');
  
  const opciones = {
    margin:       0,
    filename:     `Examen_CharlyTactico_${new Date().getTime()}.pdf`,
    image:        { type: 'jpeg', quality: 1 },
    html2canvas:  { scale: 2, useCORS: true, scrollY: 0 },
    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  html2pdf().set(opciones).from(elemento).save().then(() => {
    btn.textContent = '⬇ DESCARGAR PDF';
    btn.classList.remove('loading');
    paginas.forEach(p => {
      p.style.margin = '0 auto 20px auto';
      p.style.boxShadow = '0 8px 30px rgba(0,0,0,.4)';
    });
  });
}
</script>
</body>
</html>
