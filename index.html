<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Charly Táctico — Generador de Prácticas</title>

  <script>
    window.MathJax = {
      tex: { inlineMath:[['$','$'],['\\(','\\)']], displayMath:[['$$','$$']] },
      options: { skipHtmlTags:['script','noscript','style','textarea','pre'] },
      startup: { typeset:false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;700&display=swap');

    /* ════════════════════════════════════════════
       DISEÑO DE LA PANTALLA PRINCIPAL
    ════════════════════════════════════════════ */
    :root {
      --navy:#0a1628; --gold:#c9a84c; --gold2:#e8c97a;
      --cream:#f5f0e8; --silver:#8a9ab5; --white:#fff;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--navy);color:var(--cream);font-family:'Crimson Pro',Georgia,serif;min-height:100vh;}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(201,168,76,.12) 0%,transparent 70%),
                 radial-gradient(ellipse 50% 40% at 90% 100%,rgba(155,35,53,.08) 0%,transparent 60%),
                 repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(201,168,76,.025) 60px,rgba(201,168,76,.025) 61px),
                 repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(201,168,76,.025) 60px,rgba(201,168,76,.025) 61px);}
    .screen-wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}

    header{text-align:center;padding:2.5rem 1.5rem 2rem;border-bottom:1px solid rgba(201,168,76,.3); background:linear-gradient(180deg,rgba(0,0,0,.4) 0%,transparent 100%);}
    .badge{display:inline-block;border:1px solid var(--gold);color:var(--gold); font-family:'JetBrains Mono',monospace;font-size:.68rem;letter-spacing:.18em; padding:.22rem .9rem;text-transform:uppercase;margin-bottom:1rem;opacity:.85;}
    .site-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.8rem,8vw,6rem); letter-spacing:.06em;line-height:.92;color:var(--white);text-shadow:0 2px 24px rgba(201,168,76,.25);}
    .site-title span{color:var(--gold);display:block;}
    .site-subtitle{margin-top:.7rem;font-size:.95rem;color:var(--silver);letter-spacing:.07em;font-style:italic;}

    main{flex:1;max-width:860px;margin:2.5rem auto;padding:0 1rem;width:100%;}
    .panel{background:rgba(15,32,64,.85);border:1px solid rgba(201,168,76,.2); border-radius:4px;padding:2rem;box-shadow:0 4px 32px rgba(0,0,0,.45);backdrop-filter:blur(6px);}
    .panel-title{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.1em;color:var(--gold);margin-bottom:.35rem;}
    .panel-desc{color:var(--silver);font-size:.9rem;margin-bottom:1.6rem;border-bottom:1px solid rgba(201,168,76,.15);padding-bottom:1rem;}

    .nivel-group{display:grid;grid-template-columns:repeat(4,1fr);gap:.7rem;margin-bottom:1.6rem;}
    .nivel-btn input{display:none;}
    .nivel-btn label{display:block;text-align:center;padding:.9rem .3rem; border:1.5px solid rgba(201,168,76,.25);border-radius:3px;cursor:pointer; transition:all .25s;background:rgba(0,0,0,.2);}
    .nivel-icon{font-size:1.5rem;display:block;margin-bottom:.25rem;}
    .nivel-name{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.12em;display:block;color:var(--cream);}
    .nivel-desc{font-size:.65rem;color:var(--silver);display:block;margin-top:.1rem;}
    .nivel-btn input:checked+label{border-color:var(--gold);background:rgba(201,168,76,.12);box-shadow:0 0 18px rgba(201,168,76,.2);}
    .nivel-btn label:hover{border-color:rgba(201,168,76,.6);background:rgba(201,168,76,.07);}

    .btn-generar{width:100%;padding:1rem; background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 50%,var(--gold) 100%); background-size:200% auto;color:var(--navy);border:none;border-radius:3px; font-family:'Bebas Neue',sans-serif;font-size:1.35rem;letter-spacing:.15em;cursor:pointer; transition:background-position .4s,transform .15s,box-shadow .3s; box-shadow:0 4px 20px rgba(201,168,76,.35);}
    .btn-generar:hover{background-position:right center;transform:translateY(-2px);box-shadow:0 8px 28px rgba(201,168,76,.5);}
    
    .spinner{display:none;text-align:center;padding:1.2rem;color:var(--gold); font-family:'Bebas Neue',sans-serif;letter-spacing:.15em;}
    .spinner.active{display:block;}

    /* ══ OVERLAY Y BOTONES ══ */
    #preview-overlay{display:none;position:fixed;inset:0;z-index:100; background:rgba(5,12,28,.92);backdrop-filter:blur(4px);overflow-y:auto;padding:1.5rem .8rem;}
    #preview-overlay.active{display:block;}
    .preview-container{max-width:860px;margin:0 auto;}
    .preview-actions{display:flex;gap:.8rem;margin-bottom:1.2rem;align-items:center;}
    .btn-back{padding:.55rem 1.2rem;border:1.5px solid rgba(201,168,76,.4);background:transparent; color:var(--gold);border-radius:3px;font-family:'Bebas Neue',sans-serif; font-size:.95rem;cursor:pointer;}
    .btn-download{padding:.55rem 1.4rem;background:var(--gold);color:var(--navy); border:none;border-radius:3px;font-family:'Bebas Neue',sans-serif; font-size:.95rem;cursor:pointer;}

    /* ════════════════════════════════════════════
       MOTOR DE PAGINACIÓN FÍSICO A4
    ════════════════════════════════════════════ */
    .a4-page {
      width: 210mm; height: 297mm; background: #fff; color: #000;
      font-family: 'Crimson Pro', Georgia, serif; margin: 0 auto 20px auto;
      padding: 15mm; box-shadow: 0 8px 48px rgba(0,0,0,.6); box-sizing: border-box;
      display: flex; flex-direction: column; position: relative; overflow: hidden;
    }

    .exam-header { text-align:center; border-bottom:2.5px solid #0a1628; padding-bottom:7px; margin-bottom:8px; }
    .exam-header-small { text-align:right; font-size:8pt; border-bottom:1px solid #ccc; padding-bottom:3px; margin-bottom:10px; color:#555;}
    .exam-institution { font-size:7pt; letter-spacing:.2em; text-transform:uppercase; color:#333; font-family:'JetBrains Mono',monospace; }
    .exam-title { font-family:'Bebas Neue',sans-serif; font-size:20pt; letter-spacing:.08em; color:#0a1628; line-height:1; margin:2px 0; }
    
    .alumno-fields { display:grid; grid-template-columns:3fr 1fr; gap:8px; margin:8px 0 15px; font-size:8pt; }
    .field-label { font-size:6pt; text-transform:uppercase; letter-spacing:.1em; color:#444; margin-bottom:1px; }
    .field-line { border-bottom:1px solid #777; min-height:13px; }

    .page-content { flex-grow: 1; column-count: 2; column-gap: 8mm; column-fill: auto; width: 100%; height: 100%; overflow: hidden; }

    .seccion-header {
      column-span: all; -webkit-column-span: all; background: #0a1628; color: #fff;
      font-family: 'Bebas Neue', sans-serif; font-size: 10pt; letter-spacing: .12em;
      padding: 5px 10px; margin: 10px 0 12px 0; display: flex; justify-content: space-between; align-items: center; break-after: avoid; 
    }
    .seccion-pts { font-family:'JetBrains Mono',monospace;font-size:7.5pt;opacity:.85; }

    .q-item, .sol-item { break-inside: avoid; page-break-inside: avoid; margin-bottom: 12px; line-height: 1.35; }
    .q-subtema { font-size:6.5pt; color:#333; font-family:'JetBrains Mono',monospace; text-transform:uppercase; font-weight:bold; margin-bottom:2px; }
    .q-num { font-weight:700; color:#0a1628; font-size:9.5pt; }
    .q-enunciado { margin-bottom:4px; font-size:9.5pt; color:#000; }
    .q-alts { list-style:none; display:grid; grid-template-columns:1fr 1fr; gap:2px 6px; }
    .q-alts li { font-size:8.5pt; color:#000; }
    
    .sol-rta { display:inline-block; background:#0a1628; color:#fff; font-family:'JetBrains Mono',monospace; font-size:7.5pt; padding:1px 5px; border-radius:2px; margin:0 4px 2px 0; vertical-align:middle; }
    .sol-text { font-size:9pt; color:#111; margin-top:2px; }

    #render-buffer { position: absolute; top: -9999px; left: -9999px; width: 180mm; visibility: hidden; }

    /* ════════════════════════════════════════════
       MODO IMPRESIÓN FÍSICA A4
    ════════════════════════════════════════════ */
    @media print{
      @page{ size: A4 portrait; margin: 0; }
      body { background: #fff; }
      body > * { display: none !important; }
      #preview-overlay { display: block !important; position: static !important; background: white !important; padding: 0 !important; overflow: visible !important; }
      .preview-actions { display: none !important; }
      .a4-page { margin: 0 !important; box-shadow: none !important; border: none !important; page-break-after: always !important; }
      * { color: #000 !important; }
      .seccion-header, .sol-rta { background: #0a1628 !important; color: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>

<div class="screen-wrap">
  <header>
    <div class="badge">Academia PNP · Sistema de Evaluación9</div>
    <h1 class="site-title">Charly<span>Táctico</span></h1>
    <p class="site-subtitle">Generador de Prácticas Semanales — Suboficiales &amp; Oficiales</p>
  </header>

  <main>
    <div class="panel">
      <div class="panel-title">⚙ Generar Práctica</div>
      <div class="nivel-group">
        <div class="nivel-btn"><input type="radio" name="nivel" id="n-princ" value="principiante"><label for="n-princ"><span class="nivel-icon">🔵</span><span class="nivel-name">Principiante</span></label></div>
        <div class="nivel-btn"><input type="radio" name="nivel" id="n-facil" value="facil"><label for="n-facil"><span class="nivel-icon">🟢</span><span class="nivel-name">Fácil</span></label></div>
        <div class="nivel-btn"><input type="radio" name="nivel" id="n-medio" value="medio" checked><label for="n-medio"><span class="nivel-icon">🟡</span><span class="nivel-name">Medio</span></label></div>
        <div class="nivel-btn"><input type="radio" name="nivel" id="n-dificil" value="dificil"><label for="n-dificil"><span class="nivel-icon">🔴</span><span class="nivel-name">Difícil</span></label></div>
      </div>
      <button class="btn-generar" onclick="iniciarGeneracion()">▶ GENERAR PRÁCTICA EXACTA</button>
      <div class="spinner" id="spinner">Cargando base de datos, paginando y renderizando matemáticas...</div>
    </div>
  </main>
</div>

<div id="render-buffer"></div>
<div id="preview-overlay">
  <div class="preview-container">
    <div class="preview-actions">
      <button class="btn-back" onclick="document.getElementById('preview-overlay').classList.remove('active')">← VOLVER</button>
      <button class="btn-download" onclick="window.print()">⬇ IMPRIMIR PDF</button>
    </div>
    <div id="paginas-examen"></div>
    <div id="paginas-soluciones"></div>
  </div>
</div>

<script>

/* =========================================================================
   2. EL ALGORITMO Y EL MOTOR A4 (Intactos y funcionales)
   ========================================================================= */
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function extraerPreguntas(db, subtemasConfig, nivel, totalRequerido) {
  let seleccionadas = [];
  let poolSobrantes = [];
  
  subtemasConfig.forEach(sub => {
    if(db[sub.key]) {
      let disponibles = shuffle(db[sub.key].filter(q => q.nivel === nivel));
      let cuota = Math.ceil(totalRequerido / subtemasConfig.length);
      seleccionadas.push(...disponibles.splice(0, cuota));
      poolSobrantes.push(...disponibles);
    }
  });

  if (seleccionadas.length > totalRequerido) {
    seleccionadas = shuffle(seleccionadas).slice(0, totalRequerido);
  } else if (seleccionadas.length < totalRequerido) {
    poolSobrantes = shuffle(poolSobrantes);
    let faltan = totalRequerido - seleccionadas.length;
    seleccionadas.push(...poolSobrantes.slice(0, faltan));
  }
  return shuffle(seleccionadas);
}

function crearBloquePregunta(q, num) {
  let div = document.createElement('div');
  div.className = 'q-item';
  div.innerHTML = `<div class="q-subtema">${q.subtema}</div><div class="q-enunciado"><span class="q-num">${num}.</span> ${q.enunciado}</div><ul class="q-alts">${q.alternativas.map(a=>`<li>${a}</li>`).join('')}</ul>`;
  return div;
}

function crearBloqueSolucion(q, num) {
  let div = document.createElement('div');
  div.className = 'sol-item';
  div.innerHTML = `<div style="display:flex; align-items:flex-start;"><span class="sol-num" style="margin-right:4px;">${num}.</span><span class="sol-rta">${q.respuesta}</span><span style="font-size:7.5pt; color:#222; font-weight:bold;">${q.subtema}</span></div><div class="sol-text">${q.solucion || ''}</div>`;
  return div;
}

function crearEncabezadoSeccion(titulo, cantidad) {
  let div = document.createElement('div');
  div.className = 'seccion-header';
  div.innerHTML = `<span>${titulo}</span> ${cantidad ? `<span class="seccion-pts">${cantidad} preguntas</span>` : ''}`;
  return div;
}

function crearHojaA4(pageNum, isSol, nivelStr) {
  const page = document.createElement('div');
  page.className = 'a4-page';
  
  const header = document.createElement('div');
  if (pageNum === 1) {
    const fecha = new Date().toLocaleDateString('es-PE', { year: 'numeric', month: 'long', day: 'numeric' });
    header.className = 'exam-header';
    header.innerHTML = `
      <div class="exam-institution">Academia Charly Táctico ${isSol ? '— USO EXCLUSIVO DEL EVALUADOR' : ''}</div>
      <div class="exam-title">${isSol ? 'Hoja de Soluciones' : 'Examen General de Práctica'}</div>
      <div style="font-size:8pt; margin: 4px 0 10px 0;">Nivel: <b>${nivelStr.toUpperCase()}</b> &nbsp;|&nbsp; Fecha: ${fecha}</div>
      ${!isSol ? `<div class="alumno-fields"><div><div class="field-label">Apellidos y Nombres</div><div class="field-line"></div></div><div><div class="field-label">Fecha</div><div class="field-line"></div></div></div>` : ''}
    `;
  } else {
    header.className = 'exam-header-small';
    header.innerHTML = `Academia Charly Táctico — ${isSol ? 'Soluciones' : 'Práctica'} — Pág. ${pageNum}`;
  }
  
  page.appendChild(header);
  
  const content = document.createElement('div');
  content.className = 'page-content';
  page.appendChild(content);
  
  return { page, content };
}

async function iniciarGeneracion() {
  const nivel = document.querySelector('input[name="nivel"]:checked')?.value || 'medio';
  document.getElementById('spinner').classList.add('active');

  setTimeout(async () => {
    try {
      const buffer = document.getElementById('render-buffer');
      buffer.innerHTML = ''; 

      let itemsExamen = [];
      let itemsSolucion = [];
      const esP = (nivel === 'principiante');

      if (esP) {
        let pPrinc = extraerPreguntas(QUESTIONS_DB, CONFIG.principiante.subtemas, 'principiante', 30);
        itemsExamen.push(crearEncabezadoSeccion('Matemática — Nivel Principiante', pPrinc.length));
        itemsSolucion.push(crearEncabezadoSeccion('Soluciones — Nivel Principiante', null));
        pPrinc.forEach((q, i) => { itemsExamen.push(crearBloquePregunta(q, i+1)); itemsSolucion.push(crearBloqueSolucion(q, i+1)); });
      } else {
        let pRM = extraerPreguntas(QUESTIONS_DB, CONFIG.razonamientoMatematico.subtemas, nivel, 15);
        let pMat = extraerPreguntas(QUESTIONS_DB, CONFIG.matematicas.subtemas, nivel, 15);

        itemsExamen.push(crearEncabezadoSeccion('SECCIÓN I — Razonamiento Matemático', pRM.length));
        itemsSolucion.push(crearEncabezadoSeccion('SECCIÓN I — Soluciones RM', null));
        pRM.forEach((q, i) => { itemsExamen.push(crearBloquePregunta(q, i+1)); itemsSolucion.push(crearBloqueSolucion(q, i+1)); });

        itemsExamen.push(crearEncabezadoSeccion('SECCIÓN II — Matemáticas', pMat.length));
        itemsSolucion.push(crearEncabezadoSeccion('SECCIÓN II — Soluciones Matemáticas', null));
        pMat.forEach((q, i) => { itemsExamen.push(crearBloquePregunta(q, pRM.length+i+1)); itemsSolucion.push(crearBloqueSolucion(q, pRM.length+i+1)); });
      }

      itemsExamen.forEach(el => buffer.appendChild(el));
      itemsSolucion.forEach(el => buffer.appendChild(el));

      if (window.MathJax) await MathJax.typesetPromise([buffer]);

      const overlay = document.getElementById('preview-overlay');
      overlay.style.visibility = 'hidden';
      overlay.classList.add('active');

      function paginarElementos(arrayDOM, contenedorDestinoID, isSol) {
        const destino = document.getElementById(contenedorDestinoID);
        destino.innerHTML = '';
        
        let pageNum = 1;
        let actual = crearHojaA4(pageNum, isSol, nivel);
        destino.appendChild(actual.page);

        for (let i = 0; i < arrayDOM.length; i++) {
          let item = arrayDOM[i];
          actual.content.appendChild(item);
          
          if (Math.ceil(actual.content.scrollWidth) > Math.ceil(actual.content.clientWidth) + 2) {
            actual.content.removeChild(item); 
            
            pageNum++;
            actual = crearHojaA4(pageNum, isSol, nivel);
            destino.appendChild(actual.page);
            
            actual.content.appendChild(item);
          }
        }
      }

      paginarElementos(itemsExamen, 'paginas-examen', false);
      paginarElementos(itemsSolucion, 'paginas-soluciones', true);

      buffer.innerHTML = '';
      document.getElementById('spinner').classList.remove('active');
      overlay.style.visibility = 'visible';

    } catch(err) {
      alert("Error en el motor: " + err.message);
      document.getElementById('spinner').classList.remove('active');
    }
  }, 100);
}
