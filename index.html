<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"/>
  <title>Charly Táctico — Generador Pro</title>

  <script>
    window.MathJax = {
      tex: { inlineMath:[['$','$'],['\\(','\\)']], displayMath:[['$$','$$']] },
      options: { skipHtmlTags:['script','noscript','style','textarea','pre'] },
      startup: { typeset:false }
    };
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.0/es5/tex-mml-chtml.js" async></script>

  <script>

    const files = ['principiante.js', 'rv.js', 'rm.js', 'aritmetica.js', 'algebra.js', 'geometria.js', 'trigonometria.js'];
    files.forEach(file => {
      let script = document.createElement('script');
      script.src = file + '?v=' + version;
      script.onerror = () => console.warn(`Aviso: No se encontró el archivo ${file} aún.`);
      document.head.appendChild(script);
    });
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;700&display=swap');

    /* ════════════════════════════════════════════
       DISEÑO DE LA PANTALLA PRINCIPAL
    ════════════════════════════════════════════ */
    :root { --navy:#0a1628; --gold:#c9a84c; --gold2:#e8c97a; --cream:#f5f0e8; --silver:#8a9ab5; --white:#fff; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    
    body { background:var(--navy); color:var(--cream); font-family:'Crimson Pro',Georgia,serif; min-height:100vh; }
    .bg-effects { position:fixed; inset:0; z-index:0; background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(201,168,76,.12) 0%,transparent 70%), radial-gradient(ellipse 50% 40% at 90% 100%,rgba(155,35,53,.08) 0%,transparent 60%); pointer-events:none;}
    .screen-wrap { position:relative; z-index:1; display:flex; flex-direction:column; min-height:100vh; }
    
    header { text-align:center; padding:2rem 1.5rem 1.5rem; border-bottom:1px solid rgba(201,168,76,.3); background:linear-gradient(180deg,rgba(0,0,0,.4) 0%,transparent 100%); }
    .badge { display:inline-block; border:1px solid var(--gold); color:var(--gold); font-family:'JetBrains Mono',monospace; font-size:.68rem; letter-spacing:.18em; padding:.22rem .9rem; text-transform:uppercase; margin-bottom:1rem; }
    .site-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(2.8rem,8vw,6rem); line-height:.92; color:var(--white); }
    .site-title span { color:var(--gold); display:block; }

    main { flex:1; max-width:1100px; margin:2rem auto; padding:0 1rem; width:100%; }
    .panel { background:rgba(15,32,64,.85); border:1px solid rgba(201,168,76,.2); border-radius:4px; padding:2rem; margin-bottom: 2rem;}
    .panel-title { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:.1em; color:var(--gold); margin-bottom:1.2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(201,168,76,.2); padding-bottom: 0.5rem;}

    .nivel-group { display:grid; grid-template-columns:repeat(4,1fr); gap:.7rem; margin-bottom: 1.5rem;}
    .nivel-btn input { display:none; }
    .nivel-btn label { display:block; text-align:center; padding:.8rem .3rem; border:1.5px solid rgba(201,168,76,.25); border-radius:3px; cursor:pointer; background:rgba(0,0,0,.2); transition: 0.2s;}
    .nivel-name { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; letter-spacing:.12em; color:var(--cream); }
    .nivel-btn input:checked+label { border-color:var(--gold); background:rgba(201,168,76,.12); box-shadow:0 0 15px rgba(201,168,76,.2); }

    .matriz-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; transition: opacity 0.3s; }
    .curso-card { background: rgba(0,0,0,.3); border: 1px solid rgba(201,168,76,.15); border-radius: 4px; padding: 1.2rem; display: flex; flex-direction: column;}
    .curso-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(201,168,76,.2); padding-bottom: 0.8rem; margin-bottom: 0.8rem; }
    .curso-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: .08em; color: var(--gold); display: flex; align-items: center; gap: 8px;}
    
    .input-cant { width: 50px; background: rgba(201,168,76,.1); border: 1px solid var(--gold); color: var(--gold); text-align: center; border-radius: 3px; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; padding: 2px;}
    .check-todos { font-size: 0.8rem; color: var(--silver); cursor: pointer; display: flex; align-items: center; gap: 4px;}
    
    .tema-list { list-style: none; display: flex; flex-direction: column; gap: 8px; flex-grow: 1;}
    .tema-item { display: flex; align-items: flex-start; gap: 8px; font-size: 0.85rem; color: var(--cream); cursor: pointer; line-height: 1.2;}
    .tema-item input { accent-color: var(--gold); width: 16px; height: 16px; margin-top: 1px; cursor: pointer;}

    .btn-generar { width:100%; padding:1.2rem; background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 50%,var(--gold) 100%); color:var(--navy); border:none; border-radius:3px; font-family:'Bebas Neue',sans-serif; font-size:1.35rem; cursor:pointer; margin-top:2rem; box-shadow:0 4px 20px rgba(201,168,76,.35); text-transform: uppercase; letter-spacing: .1em;}
    .spinner { display:none; text-align:center; padding:1.2rem; color:var(--gold); font-family:'Bebas Neue',sans-serif; letter-spacing:.15em; }

    /* ════════════════════════════════════════════
       SISTEMA DE VISTA PREVIA (ZOOM NATIVO)
    ════════════════════════════════════════════ */
    body.preview-active { background: #525659; overflow: auto; }
    body.preview-active .bg-effects, body.preview-active .screen-wrap { display: none; }
    #preview-overlay { display: none; padding: 20px 0; }
    body.preview-active #preview-overlay { display: block; }

    .btn-back, .btn-download { padding:.8rem 1.5rem; border-radius:4px; font-family:'Bebas Neue',sans-serif; font-size:1.1rem; cursor:pointer; letter-spacing: 1px; transition: 0.2s;}
    .btn-back { background: #fff; color: var(--navy); border: 2px solid var(--navy); }
    .btn-download { background: var(--gold); color: var(--navy); border: none; font-weight: bold;}

    /* ════════════════════════════════════════════
       LAS HOJAS A4 Y EL DISEÑO DEL TEXTO LECTURA
    ════════════════════════════════════════════ */
    .a4-page { width: 210mm; height: 297mm; background: #fff; color: #000; font-family: 'Crimson Pro', Georgia, serif; margin: 0 auto 20px auto; padding: 15mm; box-shadow: 0 8px 30px rgba(0,0,0,.4); box-sizing: border-box; display: flex; flex-direction: column; position: relative; overflow: hidden; }
    .exam-header { text-align:center; border-bottom:2.5px solid #0a1628; padding-bottom:5px; margin-bottom:8px; }

    .exam-institution { font-size:7pt; letter-spacing:.2em; text-transform:uppercase; color:#333; font-family:'JetBrains Mono',monospace; }
    .exam-title { font-family:'Bebas Neue',sans-serif; font-size:20pt; letter-spacing:.08em; color:#0a1628; line-height:1; margin:2px 0; }

    .field-line { border-bottom: 1px solid #777; min-height: 18px; width: 100%;}

    .page-content { flex-grow: 1; column-count: 2; column-gap: 8mm; column-fill: auto; width: 100%; height: 100%; overflow: hidden; }

    .seccion-header { column-span: all; -webkit-column-span: all; background: #0a1628; color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 10pt; letter-spacing: .12em; padding: 5px 10px; margin: 5px 0 12px 0; display: flex; justify-content: space-between; align-items: center; break-after: avoid; }
    .seccion-pts { font-family:'JetBrains Mono',monospace;font-size:7.5pt;opacity:.85; }

    /* EL CUADRO DE LECTURA (COMPRENSIÓN) */
    .lectura-box { background: #f4f6f8; border: 1px solid #cdd4db; padding: 8px 10px; margin-bottom: 12px; font-size: 8.5pt; line-height: 1.4; text-align: justify; break-inside: avoid; border-left: 4px solid #0a1628;}
    
    .q-item, .sol-item { break-inside: avoid; page-break-inside: avoid; margin-bottom: 14px; line-height: 1.6; }
    .q-subtema { font-size:6.5pt; color:#555; font-family:'JetBrains Mono',monospace; text-transform:uppercase; font-weight:bold; margin-bottom:2px; line-height: 1; }
    .q-num { font-weight:700; color:#0a1628; font-size:9.5pt; }
    .q-enunciado { margin-bottom:4px; font-size:9.5pt; color:#000;}
    .q-alts { list-style:none; display:grid; grid-template-columns:1fr 1fr; gap:2px 6px; }
    .q-alts li { font-size:8.5pt; color:#000;}
    .sol-rta { display:inline-block; background:#0a1628; color:#fff; font-family:'JetBrains Mono',monospace; font-size:7.5pt; padding:1px 5px; border-radius:2px; margin:0 4px 2px 0; vertical-align:middle; }
    .sol-text { font-size:9pt; color:#111; margin-top:2px; line-height: 1.5; }

    #render-buffer { width: 86mm; position: absolute; left: -9999px; top: -9999px; visibility: hidden; }

    /* ════════════════════════════════════════════
       MOTOR NATIVO DE IMPRESIÓN (PDF PERFECTO)
    ════════════════════════════════════════════ */
    @media print {
      @page { size: A4 portrait; margin: 0; }
      body { background: #fff; margin: 0; padding: 0; }
      .bg-effects, .screen-wrap, .preview-actions { display: none !important; }
      #preview-overlay { display: block !important; padding: 0 !important; background: transparent !important; }
      .a4-page { margin: 0 !important; box-shadow: none !important; border: none !important; page-break-after: always !important; page-break-inside: avoid !important; }
      * { color: #000 !important; }
      .seccion-header, .sol-rta { background: #0a1628 !important; color: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .lectura-box { background: #f0f0f0 !important; border: 1px solid #000 !important; border-left: 4px solid #000 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>

<div class="screen-wrap">

<script>
/* ════════════════════════════════════════════
   MASTER CONFIGURACIÓN (EL TEMARIO COMPLETO)
════════════════════════════════════════════ */
const MASTER_CONFIG = {
  rv: {

    temas: [

    ]
  },

      { key: "edades", label: "3) Problemas sobre edades" },
      { key: "moviles", label: "4) Móviles, tiempo de encuentro, alcance" },
      { key: "cronometria", label: "5) Cronometría" },
      { key: "razonesProporciones", label: "6) Razones y Proporciones" },
      { key: "fracciones", label: "7) Fracciones" },
      { key: "tantoPorCiento", label: "8) Porcentajes" },
      { key: "cuatroOperaciones", label: "9) M. rectángulo, Rombo, Cangrejo, etc." },
      { key: "razonLogico", label: "10) Razonamiento Lógico" },
      { key: "series", label: "11) Series y sumatorias" }
    ]
  },
  aritmetica: {
    label: "Aritmética", file: "aritmetica.js", globalVar: "DB_ARITMETICA", defaultPreguntas: 15,
    temas: [
      { key: "numNaturales", label: "1) Sist. de los Números Naturales (ℕ)" },
      { key: "numEnteros", label: "2) Sist. de los Números Enteros (ℤ)" },
      { key: "numRacionales", label: "3) Sist. de los Números Racionales (ℚ)" },
      { key: "numReales", label: "4) Sist. de los Números Reales (ℝ)" }
    ]
  },
  algebra: {
    label: "Álgebra", file: "algebra.js", globalVar: "DB_ALGEBRA", defaultPreguntas: 15,
    temas: [
      { key: "polinomios", label: "1) Polinomios" },
      { key: "ecuacionesLineales", label: "2) Sistema de Ecuaciones Lineales" },
      { key: "funcionesProgresiones", label: "3) Funciones y Progresiones" },
      { key: "radicacionExponentes", label: "4) Radicación, Teoría de Exp." }
    ]
  },
  geometria: {
    label: "Geometría", file: "geometria.js", globalVar: "DB_GEOMETRIA", defaultPreguntas: 15,
    temas: [
      { key: "figurasAngulos", label: "1) Figuras y Ángulos" },
      { key: "semejanzaAreas", label: "2) Semejanza de Triángulos, Áreas" }
    ]
  },
  trigonometria: {
    label: "Trigonometría", file: "trigonometria.js", globalVar: "DB_TRIGONOMETRIA", defaultPreguntas: 15,
    temas: [
      { key: "razonesTrigonometricas", label: "1) Razones Trigonométricas" }
    ]
  }
};

const PRINCIPIANTE_VAR = "DB_PRINCIPIANTE";
const PRINCIPIANTE_TEMAS = ["operBasicasNeg","fraccionesNeg","factorizacionBasica","sumaExpAlg","enunciadosAlg","mcdMcm","decimales","divisibilidad","multExpAlg","despejarX","angulosNotables"];

/* ════════════════════════════════════════════
   CONSTRUCCIÓN DINÁMICA DE LA UI
════════════════════════════════════════════ */
document.addEventListener("DOMContentLoaded", () => {
  const matrizContainer = document.getElementById('matriz-temas');
  
  for (const [courseKey, courseData] of Object.entries(MASTER_CONFIG)) {
    let card = document.createElement('div');
    card.className = 'curso-card';
    
    let headerHTML = `
      <div class="curso-header">
        <div class="curso-title">
          <input type="checkbox" id="todos_${courseKey}" class="chk-master" checked onchange="toggleAll('${courseKey}')" style="width:16px;height:16px;">
          ${courseData.label}
        </div>
        <div style="display:flex; align-items:center; gap:5px;">
          <span style="font-size:0.7rem; color:var(--silver); text-transform:uppercase;">Cant:</span>
          <input type="number" id="cant_${courseKey}" class="input-cant" value="${courseData.defaultPreguntas}" min="1" max="50">
        </div>
      </div>
      <ul class="tema-list" id="lista_${courseKey}">
    `;
    
    let temasHTML = courseData.temas.map(tema => `
      <label class="tema-item">
        <input type="checkbox" class="chk_${courseKey}" value="${tema.key}" checked onchange="checkSync('${courseKey}')">
        ${tema.label}
      </label>
    `).join('');
    
    card.innerHTML = headerHTML + temasHTML + `</ul>`;
    matrizContainer.appendChild(card);
  }

  document.querySelectorAll('input[name="nivel"]').forEach(radio => {
    radio.addEventListener('change', (e) => {
      if (e.target.value === 'principiante') {
        matrizContainer.style.opacity = '0.3';
        matrizContainer.style.pointerEvents = 'none';
      } else {
        matrizContainer.style.opacity = '1';
        matrizContainer.style.pointerEvents = 'auto';
      }
    });
  });
});

function toggleAll(courseKey) {
  let master = document.getElementById(`todos_${courseKey}`).checked;
  document.querySelectorAll(`.chk_${courseKey}`).forEach(chk => chk.checked = master);
}
function checkSync(courseKey) {
  let allChecked = Array.from(document.querySelectorAll(`.chk_${courseKey}`)).every(chk => chk.checked);
  document.getElementById(`todos_${courseKey}`).checked = allChecked;
}

/* ════════════════════════════════════════════
   ALGORITMOS DE SELECCIÓN Y AGRUPACIÓN
════════════════════════════════════════════ */
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function extraerProporcional(dbInfo, selectedKeys, nivel, totalReq) {
  if (!window[dbInfo.globalVar]) return { encontradas: 0, items: [] }; 
  const db = window[dbInfo.globalVar];
  
  let disponiblesPorTema = {};
  let totalDisponible = 0;

  selectedKeys.forEach(key => {
    let preguntas = shuffle((db[key] || []).filter(q => q.nivel === nivel));
    disponiblesPorTema[key] = preguntas;
    totalDisponible += preguntas.length;
  });

  if (totalDisponible === 0) return { encontradas: 0, items: [] };

  let seleccionadas = [];
  if (totalDisponible <= totalReq) {
    selectedKeys.forEach(key => seleccionadas.push(...disponiblesPorTema[key]));
    seleccionadas = shuffle(seleccionadas);
  } else {
    let cuotas = {};
    selectedKeys.forEach(k => cuotas[k] = 0);
    let temasActivos = [...selectedKeys];
    let faltan = totalReq;

    while (faltan > 0 && temasActivos.length > 0) {
      let cuotaBase = Math.floor(faltan / temasActivos.length);
      let extra = faltan % temasActivos.length;
      let nuevosActivos = [];
      let huboSaturacion = false;

      for (let i = 0; i < temasActivos.length; i++) {
        let tema = temasActivos[i];
        let pedir = cuotaBase + (i < extra ? 1 : 0);
        let asignado = cuotas[tema];
        let disponible = disponiblesPorTema[tema].length;

        if (asignado + pedir >= disponible) {
          cuotas[tema] = disponible;
          faltan -= (disponible - asignado);
          huboSaturacion = true;
        } else {
          cuotas[tema] += pedir;
          faltan -= pedir;
          nuevosActivos.push(tema);
        }
      }
      if (!huboSaturacion) break; 
      temasActivos = nuevosActivos;
    }

    selectedKeys.forEach(tema => {
      if(cuotas[tema] > 0) seleccionadas.push(...disponiblesPorTema[tema].splice(0, cuotas[tema]));
    });
    seleccionadas = shuffle(seleccionadas);
  }

  // AGRUPAR POR CÓDIGO DE LECTURA (id_texto)
  seleccionadas.sort((a, b) => {
    let tA = a.id_texto || "";
    let tB = b.id_texto || "";
    if (tA < tB) return -1;
    if (tA > tB) return 1;
    return 0;
  });

  return { encontradas: seleccionadas.length, items: seleccionadas };
}

function crearBloqueLectura(texto) {
  let div = document.createElement('div');
  div.className = 'lectura-box';
  div.innerHTML = `<strong>TEXTO DE COMPRENSIÓN:</strong><br>${texto}`;
  return div;
}

function crearBloquePregunta(q, num) {
  let div = document.createElement('div');
  div.className = 'q-item';
  div.innerHTML = `<div class="q-subtema">${q.subtema}</div><div class="q-enunciado"><span class="q-num">${num}.</span> ${q.enunciado}</div><ul class="q-alts">${q.alternativas.map(a=>`<li>${a}</li>`).join('')}</ul>`;
  return div;
}

function crearBloqueSolucion(q, num) {
  let div = document.createElement('div');
  div.className = 'sol-item';
  div.innerHTML = `<div style="display:flex; align-items:flex-start;"><span class="sol-num" style="margin-right:4px;">${num}.</span><span class="sol-rta">${q.respuesta}</span><span style="font-size:7.5pt; color:#222; font-weight:bold;">${q.subtema}</span></div><div class="sol-text">${q.solucion || ''}</div>`;
  return div;
}

function crearEncabezadoSeccion(titulo, cantidad) {
  let div = document.createElement('div');
  div.className = 'seccion-header';
  div.innerHTML = `<span>${titulo}</span> ${cantidad ? `<span class="seccion-pts">${cantidad} preguntas</span>` : ''}`;
  return div;
}

function crearHojaA4(pageNum, isSol, nivelStr) {
  const page = document.createElement('div');
  page.className = 'a4-page';
  const header = document.createElement('div');
  if (pageNum === 1) {
    header.className = 'exam-header';
    header.innerHTML = `
      <div class="exam-institution">Academia Charly Táctico ${isSol ? '— USO EXCLUSIVO DEL EVALUADOR' : ''}</div>
      <div class="exam-title">${isSol ? 'Hoja de Soluciones' : 'Examen General de Práctica'}</div>
      <div style="font-size:8pt; margin: 4px 0 10px 0;">Nivel de Exigencia: <b>${nivelStr.toUpperCase()}</b></div>
      ${!isSol ? `<div class="alumno-fields"><div class="field-label">Apellidos y Nombres:</div><div class="field-line"></div></div>` : ''}
    `;
  } else {
    header.className = 'exam-header-small';
    header.innerHTML = `Academia Charly Táctico — ${isSol ? 'Soluciones' : 'Práctica'} — Pág. ${pageNum}`;
  }
  page.appendChild(header);
  const content = document.createElement('div');
  content.className = 'page-content';
  page.appendChild(content);
  return { page, content };
}

/* ════════════════════════════════════════════
   EL MOTOR PRINCIPAL Y PAGINADOR
════════════════════════════════════════════ */
async function iniciarGeneracion() {
  const nivel = document.querySelector('input[name="nivel"]:checked')?.value || 'medio';
  document.getElementById('spinner').classList.add('active');

  setTimeout(async () => {
    try {
      const buffer = document.getElementById('render-buffer');
      buffer.innerHTML = ''; 

      let itemsExamen = [];
      let itemsSolucion = [];
      let pregCounter = 1;
      let logAvisos = [];

      if (nivel === 'principiante') {
        if (!window[PRINCIPIANTE_VAR]) {
          alert("Aviso: Falta el archivo principiante.js");
          document.getElementById('spinner').classList.remove('active');
          return;
        }
        let pPrinc = extraerProporcional({globalVar: PRINCIPIANTE_VAR}, PRINCIPIANTE_TEMAS, 'principiante', 30);
        
        itemsExamen.push(crearEncabezadoSeccion('Matemática Básica — Nivel Principiante', pPrinc.encontradas));
        itemsSolucion.push(crearEncabezadoSeccion('Soluciones — Nivel Principiante', null));
        
        pPrinc.items.forEach(q => {
          itemsExamen.push(crearBloquePregunta(q, pregCounter)); 
          itemsSolucion.push(crearBloqueSolucion(q, pregCounter));
          pregCounter++;
        });

      } else {
        let seccionRoma = ['I', 'II', 'III', 'IV', 'V', 'VI'];
        let secIndex = 0;

        for (const [courseKey, courseData] of Object.entries(MASTER_CONFIG)) {
          let checkboxMaster = document.getElementById(`todos_${courseKey}`);
          if (!checkboxMaster.checked && !Array.from(document.querySelectorAll(`.chk_${courseKey}:checked`)).length) continue;

          let selectedChecks = Array.from(document.querySelectorAll(`.chk_${courseKey}:checked`)).map(chk => chk.value);
          let targetQty = parseInt(document.getElementById(`cant_${courseKey}`).value) || courseData.defaultPreguntas;
          
          if (selectedChecks.length > 0) {
            let res = extraerProporcional(courseData, selectedChecks, nivel, targetQty);
            
            if (res.encontradas > 0) {
              if (res.encontradas < targetQty) {
                logAvisos.push(`Solo se encontraron ${res.encontradas} de ${targetQty} preguntas en ${courseData.label}.`);
              }

              itemsExamen.push(crearEncabezadoSeccion(`SECCIÓN ${seccionRoma[secIndex]} — ${courseData.label}`, res.encontradas));
              itemsSolucion.push(crearEncabezadoSeccion(`SECCIÓN ${seccionRoma[secIndex]} — Soluciones`, null));
              
              let lastTextoId = "";
              res.items.forEach(q => {
                // LÓGICA DEL CÓDIGO DE TEXTO
                if (q.id_texto && q.id_texto !== lastTextoId) {
                  // Busca el texto en el banco global de variables
                  let textoReal = (window.TEXTOS_LECTURA && window.TEXTOS_LECTURA[q.id_texto]) 
                                  ? window.TEXTOS_LECTURA[q.id_texto] 
                                  : "Error: No se encontró el texto referenciado.";
                  itemsExamen.push(crearBloqueLectura(textoReal));
                  lastTextoId = q.id_texto;
                }
                
                itemsExamen.push(crearBloquePregunta(q, pregCounter)); 
                itemsSolucion.push(crearBloqueSolucion(q, pregCounter)); 
                pregCounter++;
              });
              secIndex++;
            }
          }
        }
      }

      if(itemsExamen.length === 0) {
        alert("No se generó ninguna pregunta. Revisa que los archivos .js existan y tengan contenido para el nivel seleccionado.");
        document.getElementById('spinner').classList.remove('active');
        return;
      }

      itemsExamen.forEach(el => buffer.appendChild(el));
      itemsSolucion.forEach(el => buffer.appendChild(el));

      if (window.MathJax && window.MathJax.typesetPromise) {
        await MathJax.typesetPromise([buffer]);
      }

      document.body.classList.add('preview-active');
      
      function paginarElementos(arrayDOM, contenedorDestinoID, isSol) {
        const destino = document.getElementById(contenedorDestinoID);
        destino.innerHTML = '';
        let pageNum = 1;
        let actual = crearHojaA4(pageNum, isSol, nivel);
        destino.appendChild(actual.page);

        for (let i = 0; i < arrayDOM.length; i++) {
          let item = arrayDOM[i];
          actual.content.appendChild(item);
          
          if (Math.ceil(actual.content.scrollWidth) > Math.ceil(actual.content.clientWidth) + 5) {
            actual.content.removeChild(item); 
            pageNum++;
            actual = crearHojaA4(pageNum, isSol, nivel);
            destino.appendChild(actual.page);
            actual.content.appendChild(item);
          }
        }
      }

      paginarElementos(itemsExamen, 'paginas-examen', false);
      paginarElementos(itemsSolucion, 'paginas-soluciones', true);

      buffer.innerHTML = '';
      document.getElementById('spinner').classList.remove('active');

      if(logAvisos.length > 0) console.warn("Avisos:\n" + logAvisos.join("\n"));

    } catch(err) {
      alert("Aviso: " + err.message);
      document.getElementById('spinner').classList.remove('active');
    }
  }, 200); 
}

function cerrarPreview() {
  document.body.classList.remove('preview-active');
}
</script>
